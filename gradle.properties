org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Use JDK 17 for Gradle and Android Gradle Plugin (recommended). Homebrew: brew install openjdk@17
# Intel Homebrew default; on Apple Silicon use: /opt/homebrew/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
org.gradle.java.home=/usr/local/opt/openjdk@17/libexec/openjdk.jdk/Contents/Home
# If your default `java` is newer (e.g. 25), also export JAVA_HOME to the same path before ./gradlew so the wrapper uses JDK 17.

android.useAndroidX=true
android.nonTransitiveRClass=true
